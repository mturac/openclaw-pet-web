<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐣 OpenClaw Pet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 15px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            text-align: center;
            margin-bottom: 10px;
        }
        
        .pet-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        /* EGG CRACKING ANIMATION */
        .egg-container {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .egg {
            font-size: 120px;
            animation: eggShake 2s infinite;
            transition: all 0.5s;
        }
        
        .egg.cracking {
            animation: eggCrack 0.5s forwards;
        }
        
        .egg.broken {
            animation: none;
            opacity: 0;
            transform: scale(0);
        }
        
        @keyframes eggShake {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }
        
        @keyframes eggCrack {
            0% { transform: scale(1) rotate(0); }
            25% { transform: scale(1.1) rotate(-5deg); }
            50% { transform: scale(1.1) rotate(5deg); }
            75% { transform: scale(1.2) rotate(-3deg); }
            100% { transform: scale(0) rotate(0); opacity: 0; }
        }
        
        /* CRACK LINES */
        .crack-lines {
            position: absolute;
            font-size: 100px;
            opacity: 0;
            pointer-events: none;
        }
        
        .crack-lines.show {
            animation: showCrack 0.3s forwards;
        }
        
        @keyframes showCrack {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        /* PET */
        .pet {
            position: absolute;
            font-size: 100px;
            opacity: 0;
            transform: scale(0);
            transition: all 0.5s;
        }
        
        .pet.hatched {
            opacity: 1;
            transform: scale(1);
            animation: petBounce 1s infinite;
        }
        
        @keyframes petBounce {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.1) translateY(-10px); }
        }
        
        .shake-hint {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.7;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        
        .stats {
            width: 100%;
            margin-top: 20px;
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        .stats.show {
            opacity: 1;
        }
        
        .stat {
            display: flex;
            align-items: center;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 15px;
        }
        
        .stat-bar {
            flex: 1;
            height: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            overflow: hidden;
            margin: 0 10px;
        }
        
        .stat-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s;
        }
        
        .hunger-fill { background: #ff6b6b; }
        .happy-fill { background: #4ecdc4; }
        .energy-fill { background: #45b7d1; }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        
        .controls.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .btn {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 15px;
            padding: 15px;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐣 OpenClaw Pet</h1>
        </        </div>
        
        <div class="pet-card">
            <div class="egg-container" id="eggContainer" onclick="tapEgg()">
                <div class="egg" id="egg">🥚</div>
                <div class="crack-lines" id="crackLines">🐣</div>
                <div class="pet" id="pet">🤖</div>
            </div>
            
            <div class="shake-hint" id="shakeHint">
                📱 Shake phone or tap egg to hatch!
            </div>
            
            <div class="stats" id="stats">
                <div class="stat">
                    <span>🍕</span>
                    <div class="stat-bar"><div class="stat-fill hunger-fill" id="hunger" style="width: 50%"></div></div>
                    <span id="hungerVal">50</span>
                </div>
                <div class="stat">
                    <span>😊</span>
                    <div class="stat-bar"><div class="stat-fill happy-fill" id="happy" style="width: 50%"></div></div>
                    <span id="happyVal">50</span>
                </div>
                <div class="stat">
                    <span>⚡</span>
                    <div class="stat-bar"><div class="stat-fill energy-fill" id="energy" style="width: 100%"></div></div>
                    <span id="energyVal">100</span>
                </div>
            </div>
        </div>
        
        <div class="controls" id="controls">
            <button class="btn" onclick="feed()">🍕</button>
            <button class="btn" onclick="play()">🎮</button>
            <button class="btn" onclick="code()">💻</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        let hatched = false;
        let tapCount = 0;
        
        let pet = {
            hunger: 50,
            happy: 50,
            energy: 100,
            stage: 0
        };
        
        // SHAKE DETECTION
        let lastX = 0, lastY = 0, lastZ = 0;
        let shakeThreshold = 15;
        
        if (window.DeviceMotionEvent) {
            window.addEventListener('devicemotion', function(event) {
                let acceleration = event.accelerationIncludingGravity;
                let currentX = acceleration.x;
                let currentY = acceleration.y;
                let currentZ = acceleration.z;
                
                let deltaX = Math.abs(currentX - lastX);
                let deltaY = Math.abs(currentY - lastY);
                let deltaZ = Math.abs(currentZ - lastZ);
                
                if ((deltaX > shakeThreshold || deltaY > shakeThreshold || deltaZ > shakeThreshold) && !hatched) {
                    tapEgg();
                }
                
                lastX = currentX;
                lastY = currentY;
                lastZ = currentZ;
            }, false);
        }
        
        function tapEgg() {
            if (hatched) return;
            
            tapCount++;
            const egg = document.getElementById('egg');
            const crackLines = document.getElementById('crackLines');
            
            // Vibrate
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
            tg.HapticFeedback.impactOccurred('light');
            
            // Visual shake
            egg.style.transform = `rotate(${Math.random() * 10 - 5}deg) scale(${1 + tapCount * 0.05})`;
            
            // Show crack after 3 taps
            if (tapCount >= 3) {
                crackLines.classList.add('show');
            }
            
            // Hatch after 5 taps
            if (tapCount >= 5) {
                hatchEgg();
            }
        }
        
        function hatchEgg() {
            hatched = true;
            const egg = document.getElementById('egg');
            const crackLines = document.getElementById('crackLines');
            const pet = document.getElementById('pet');
            const hint = document.getElementById('shakeHint');
            const stats = document.getElementById('stats');
            const controls = document.getElementById('controls');
            
            // Animation
            egg.classList.add('cracking');
            
            // Sound
            playHatchSound();
            
            // Vibrate pattern
            if (navigator.vibrate) {
                navigator.vibrate([100, 50, 100, 50, 200]);
            }
            tg.HapticFeedback.notificationOccurred('success');
            
            setTimeout(() => {
                egg.classList.add('broken');
                crackLines.style.opacity = '0';
                pet.classList.add('hatched');
                hint.style.display = 'none';
                stats.classList.add('show');
                controls.classList.add('active');
                
                tg.showPopup({
                    title: '🎉 It\'s a Baby Bot!',
                    message: 'Your pet has hatched! Take good care of it!'
                });
            }, 500);
        }
        
        function playHatchSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(800, audioContext.currentTime + 0.1);
            oscillator.frequency.exponentialRampToValueAtTime(1200, audioContext.currentTime + 0.3);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.5);
        }
        
        function feed() {
            pet.hunger = Math.min(100, pet.hunger + 20);
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
        }
        
        function play() {
            pet.happy = Math.min(100, pet.happy + 15);
            pet.energy = Math.max(0, pet.energy - 10);
            updateUI();
            tg.HapticFeedback.impactOccurred('medium');
        }
        
        function code() {
            pet.energy = Math.max(0, pet.energy - 5);
            updateUI();
            tg.HapticFeedback.notificationOccurred('success');
        }
        
        function updateUI() {
            document.getElementById('hunger').style.width = pet.hunger + '%';
            document.getElementById('hungerVal').textContent = pet.hunger;
            document.getElementById('happy').style.width = pet.happy + '%';
            document.getElementById('happyVal').textContent = pet.happy;
            document.getElementById('energy').style.width = pet.energy + '%';
            document.getElementById('energyVal').textContent = pet.energy;
        }
    </script>
</body>
</html>
