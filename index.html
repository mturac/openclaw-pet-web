<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐣 OpenClaw Pet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="dialogues.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        
        /* ==================== EGG SCREEN ==================== */
        .egg-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }
        
        .egg-container {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .egg {
            font-size: 120px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }
        
        .egg.shake {
            animation: shake 0.3s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(-10deg) scale(1.1); }
            75% { transform: rotate(10deg) scale(1.1); }
        }
        
        .crack-overlay {
            position: absolute;
            font-size: 120px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .crack-overlay.show {
            opacity: 1;
        }
        
        .tap-hint {
            margin-top: 30px;
            text-align: center;
            font-size: 18px;
            opacity: 0.9;
            animation: pulse 2s infinite;
        }
        
        .tap-counter {
            margin-top: 10px;
            font-size: 16px;
            opacity: 0.7;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.9; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        
        /* ==================== PET SCREEN ==================== */
        .pet-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
            padding: 15px;
            max-width: 400px;
            margin: 0 auto;
        }
        
        .pet-screen.active {
            display: flex;
        }
        
        .header {
            text-align: center;
            margin-bottom: 10px;
        }
        
        .level-badge {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
            font-size: 14px;
            font-weight: bold;
        }
        
        /* PET SPEECH BUBBLE - DEMAND */
        .speech-bubble {
            background: white;
            color: #333;
            padding: 15px 20px;
            border-radius: 20px;
            margin: 10px 20px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: bounceIn 0.5s ease;
            position: relative;
        }
        
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: white transparent transparent;
        }
        
        .speech-bubble.hunger {
            background: #ff6b6b;
            color: white;
        }
        
        .speech-bubble.hunger::after {
            border-color: #ff6b6b transparent transparent;
        }
        
        .speech-bubble.happy {
            background: #4ecdc4;
            color: white;
        }
        
        .speech-bubble.happy::after {
            border-color: #4ecdc4 transparent transparent;
        }
        
        .speech-bubble.energy {
            background: #45b7d1;
            color: white;
        }
        
        .speech-bubble.energy::after {
            border-color: #45b7d1 transparent transparent;
        }
        
        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .pet-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            margin: 10px 0;
            border: 2px solid rgba(255,255,255,0.2);
            padding: 20px;
        }
        
        .pet-character {
            font-size: 100px;
            animation: bounce 2s infinite ease-in-out;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .pet-character:active {
            transform: scale(0.9);
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }
        
        .stats-container {
            width: 100%;
            padding: 0 10px;
            margin-top: 20px;
        }
        
        .stat-row {
            display: flex;
            align-items: center;
            margin: 12px 0;
            background: rgba(0,0,0,0.2);
            padding: 12px 15px;
            border-radius: 15px;
            transition: all 0.3s;
        }
        
        .stat-row.critical {
            background: rgba(255,107,107,0.3);
            border: 2px solid #ff6b6b;
            animation: pulse-red 2s infinite;
        }
        
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,107,0.4); }
            50% { box-shadow: 0 0 0 10px rgba(255,107,107,0); }
        }
        
        .stat-icon {
            font-size: 24px;
            margin-right: 12px;
            width: 30px;
            text-align: center;
        }
        
        .stat-bar-bg {
            flex: 1;
            height: 22px;
            background: rgba(0,0,0,0.3);
            border-radius: 11px;
            overflow: hidden;
            margin-right: 12px;
        }
        
        .stat-bar-fill {
            height: 100%;
            border-radius: 11px;
            transition: width 0.5s ease;
        }
        
        .hunger-fill { background: linear-gradient(90deg, #ff6b6b, #ff8e8e); }
        .happy-fill { background: linear-gradient(90deg, #4ecdc4, #6ee7df); }
        .energy-fill { background: linear-gradient(90deg, #45b7d1, #74c7e3); }
        
        .stat-value {
            width: 40px;
            text-align: right;
            font-weight: bold;
            font-size: 16px;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 15px;
        }
        
        .action-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 15px 10px;
            color: white;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .action-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.3);
        }
        
        .action-btn.highlight {
            animation: highlight 1s infinite;
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        
        @keyframes highlight {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .action-btn span {
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .btn-feed:active, .btn-feed.highlight { background: rgba(255,107,107,0.5); }
        .btn-play:active, .btn-play.highlight { background: rgba(78,205,196,0.5); }
        .btn-code:active, .btn-code.highlight { background: rgba(69,183,209,0.5); }
        
        .xp-bar-container {
            margin-top: 15px;
            padding: 0 10px;
        }
        
        .xp-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 5px;
            opacity: 0.8;
        }
        
        .xp-bar {
            height: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .xp-fill {
            height: 100%;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>
    <!-- STATE 1: EGG -->
    <div class="egg-screen" id="eggScreen">
        <div class="egg-container" id="eggContainer">
            <div class="egg" id="egg">🥚</div>
            <div class="crack-overlay" id="crackOverlay">🐣</div>
        </div>
        <div class="tap-hint">📱 Shake or tap 5 times!</div>
        <div class="tap-counter" id="tapCounter">0 / 5</div>
    </div>
    
    <!-- STATE 2: PET -->
    <div class="pet-screen" id="petScreen">
        <div class="header">
            <div class="level-badge">⭐ Level <span id="levelNum">1</span> - <span id="stageName">Baby Bot</span></div>
        </div>
        
        <!-- PET DEMANDS -->
        <div class="speech-bubble" id="speechBubble" style="display: none;">
            I'm hungry! Feed me! 🍕
        </div>
        
        <div class="pet-area">
            <div class="pet-character" id="petCharacter">🤖</div>
            
            <div class="stats-container">
                <div class="stat-row" id="hungerRow">
                    <span class="stat-icon">🍕</span>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fill hunger-fill" id="hungerBar" style="width: 50%"></div>
                    </div>
                    <span class="stat-value" id="hungerValue">50</span>
                </div>
                <div class="stat-row" id="happyRow">
                    <span class="stat-icon">😊</span>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fill happy-fill" id="happyBar" style="width: 50%"></div>
                    </div>
                    <span class="stat-value" id="happyValue">50</span>
                </div>
                <div class="stat-row" id="energyRow">
                    <span class="stat-icon">⚡</span>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fill energy-fill" id="energyBar" style="width: 100%"></div>
                    </div>
                    <span class="stat-value" id="energyValue">100</span>
                </div>
            </div>
            
            <div class="xp-bar-container">
                <div class="xp-label">
                    <span>XP</span>
                    <span id="xpText">0/100</span>
                </div>
                <div class="xp-bar">
                    <div class="xp-fill" id="xpBar" style="width: 0%"></div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button class="action-btn btn-feed" id="feedBtn" onclick="action('feed')">
                🍕
                <span>Feed</span>
            </button>
            <button class="action-btn btn-play" id="playBtn" onclick="action('play')">
                🎮
                <span>Play</span>
            </button>
            <button class="action-btn btn-code" id="codeBtn" onclick="action('code')">
                💻
                <span>Code</span>
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // ==================== GAME STATE ====================
        let gameState = {
            hatched: false,
            tapCount: 0,
            stage: 0,
            level: 1,
            xp: 0,
            hunger: 50,
            happy: 50,
            energy: 100
        };
        
        const STAGES = ['Baby Bot', 'Teen Coder', 'Senior Dev', '10x Legend'];
        const PETS = ['🤖', '💻', '🦖', '👑'];
        
        // Demands based on stats
        // Using dialogue system from dialogues.js
        
        // ==================== EGG STATE ====================
        const eggContainer = document.getElementById('eggContainer');
        const egg = document.getElementById('egg');
        const crackOverlay = document.getElementById('crackOverlay');
        const tapCounter = document.getElementById('tapCounter');
        const eggScreen = document.getElementById('eggScreen');
        const petScreen = document.getElementById('petScreen');
        
        eggContainer.addEventListener('click', function() {
            if (gameState.hatched) return;
            
            gameState.tapCount++;
            
            egg.classList.add('shake');
            setTimeout(() => egg.classList.remove('shake'), 300);
            
            tg.HapticFeedback.impactOccurred('light');
            
            if (gameState.tapCount >= 3) {
                crackOverlay.classList.add('show');
            }
            
            tapCounter.textContent = gameState.tapCount + ' / 5';
            
            if (gameState.tapCount >= 5) {
                hatchEgg();
            }
        });
        
        function hatchEgg() {
            gameState.hatched = true;
            egg.style.transition = 'all 0.5s';
            egg.style.transform = 'scale(1.5) rotate(10deg)';
            egg.style.opacity = '0';
            
            tg.HapticFeedback.notificationOccurred('success');
            
            setTimeout(() => {
                eggScreen.style.display = 'none';
                petScreen.classList.add('active');
                
                tg.showPopup({
                    title: '🎉 Welcome!',
                    message: 'Your Baby Bot has hatched! Take good care of it!'
                });
                
                updateUI();
                checkDemands();
            }, 500);
        }
        
        // ==================== PET DEMANDS ====================
        function checkDemands() {
            if (!gameState.hatched) return;
            
            const bubble = document.getElementById('speechBubble');
            const feedBtn = document.getElementById('feedBtn');
            const playBtn = document.getElementById('playBtn');
            const codeBtn = document.getElementById('codeBtn');
            
            // Remove all highlights
            feedBtn.classList.remove('highlight');
            playBtn.classList.remove('highlight');
            codeBtn.classList.remove('highlight');
            
            let demandText = '';
            let demandType = '';
            
            // Check critical stats (priority)
            if (gameState.hunger < 30) {
                demandText = getDemand('hunger');
                demandType = 'hunger';
                feedBtn.classList.add('highlight');
                document.getElementById('hungerRow').classList.add('critical');
            } else if (gameState.happy < 30) {
                demandText = getDemand('happy');
                demandType = 'happy';
                playBtn.classList.add('highlight');
                document.getElementById('happyRow').classList.add('critical');
            } else if (gameState.energy > 30 && gameState.xp < 50) {
                demandText = getDemand('code');
                demandType = 'code';
                codeBtn.classList.add('highlight');
            }
            
            if (demandText) {
                bubble.textContent = demandText;
                bubble.className = 'speech-bubble ' + demandType;
                bubble.style.display = 'block';
                
                tg.HapticFeedback.notificationOccurred('warning');
            } else {
                bubble.style.display = 'none';
                document.getElementById('hungerRow').classList.remove('critical');
                document.getElementById('happyRow').classList.remove('critical');
            }
        }
        
        // ==================== PET ACTIONS ====================
        function action(type) {
            if (!gameState.hatched) return;
            
            tg.HapticFeedback.impactOccurred('medium');
            
            const bubble = document.getElementById('speechBubble');
            
            switch(type) {
                case 'feed':
                    gameState.hunger = Math.min(100, gameState.hunger + 25);
                    gameState.energy = Math.max(0, gameState.energy - 5);
                    addXP(5);
                    bubble.textContent = getResponse('feed');
                    bubble.className = 'speech-bubble hunger';
                    break;
                case 'play':
                    gameState.happy = Math.min(100, gameState.happy + 20);
                    gameState.energy = Math.max(0, gameState.energy - 10);
                    gameState.hunger = Math.max(0, gameState.hunger - 5);
                    addXP(10);
                    bubble.textContent = getResponse('play');
                    bubble.className = 'speech-bubble happy';
                    break;
                case 'code':
                    if (gameState.energy < 10) {
                        bubble.textContent = "Too tired... Need sleep 😴";
                        bubble.className = 'speech-bubble energy';
                        return;
                    }
                    gameState.energy = Math.max(0, gameState.energy - 8);
                    gameState.hunger = Math.max(0, gameState.hunger - 3);
                    addXP(20);
                    bubble.textContent = getResponse('code');
                    bubble.className = 'speech-bubble';
                    break;
            }
            
            bubble.style.display = 'block';
            setTimeout(() => {
                checkDemands();
            }, 2000);
            
            updateUI();
        }
        
        function addXP(amount) {
            gameState.xp += amount;
            
            if (gameState.xp >= 100) {
                gameState.level++;
                gameState.xp = 0;
                
                tg.showPopup({
                    title: '⭐ LEVEL UP!',
                    message: `You're now Level ${gameState.level}!`
                });
                
                const newStage = Math.floor((gameState.level - 1) / 5);
                if (newStage > gameState.stage && newStage < 4) {
                    gameState.stage = newStage;
                    
                    setTimeout(() => {
                        tg.showPopup({
                            title: '✨ EVOLUTION!',
                            message: `Your pet evolved into ${STAGES[gameState.stage]}!`
                        });
                    }, 1000);
                }
            }
        }
        
        function updateUI() {
            document.getElementById('levelNum').textContent = gameState.level;
            document.getElementById('stageName').textContent = STAGES[gameState.stage];
            document.getElementById('petCharacter').textContent = PETS[gameState.stage];
            
            document.getElementById('hungerBar').style.width = gameState.hunger + '%';
            document.getElementById('hungerValue').textContent = gameState.hunger;
            
            document.getElementById('happyBar').style.width = gameState.happy + '%';
            document.getElementById('happyValue').textContent = gameState.happy;
            
            document.getElementById('energyBar').style.width = gameState.energy + '%';
            document.getElementById('energyValue').textContent = gameState.energy;
            
            document.getElementById('xpBar').style.width = gameState.xp + '%';
            document.getElementById('xpText').textContent = gameState.xp + '/100';
        }
        
        // Auto decay
        setInterval(() => {
            if (!gameState.hatched) return;
            
            gameState.hunger = Math.max(0, gameState.hunger - 2);
            gameState.happy = Math.max(0, gameState.happy - 1);
            
            // Pet asks for things
            if (Math.random() > 0.7) {
                checkDemands();
            }
            
            updateUI();
        }, 30000); // Every 30 seconds
        
        // Initial demand check
        setTimeout(checkDemands, 1000);
    </script>
</body>
</html>
