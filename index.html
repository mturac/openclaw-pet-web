<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OpenClaw Pet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #ffffff);
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .header h1 {
            font-size: 24px;
            color: var(--tg-theme-button-color, #4ecdc4);
        }
        
        .pet-screen {
            background: var(--tg-theme-secondary-bg-color, #0f0f23);
            border-radius: 20px;
            padding: 25px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .pet-container {
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
        }
        
        .pet-emoji {
            font-size: 100px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .stats {
            width: 100%;
            margin-top: 15px;
        }
        
        .stat {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }
        
        .stat-bar {
            flex: 1;
            height: 22px;
            background: #333;
            border-radius: 11px;
            overflow: hidden;
            margin: 0 10px;
        }
        
        .stat-fill {
            height: 100%;
            border-radius: 11px;
            transition: width 0.5s ease;
        }
        
        .hunger { background: #ff6b6b; }
        .happy { background: #4ecdc4; }
        .energy { background: #45b7d1; }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 15px;
        }
        
        .btn {
            background: var(--tg-theme-button-color, #4ecdc4);
            border: none;
            border-radius: 15px;
            padding: 15px;
            color: var(--tg-theme-button-text-color, #ffffff);
            font-size: 28px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐣 OpenClaw Pet</h1>
        </div>
        
        <div class="pet-screen">
            <div class="level-badge" id="level">Level 1 - Egg</div>
            <div class="pet-container">
                <div class="pet-emoji" id="pet">🥚</div>
            </div>
            
            <div class="stats">
                <div class="stat">
                    <span>🍕</span>
                    <div class="stat-bar">
                        <div class="stat-fill hunger" id="hunger-bar" style="width: 50%"></div>
                    </div>
                    <span id="hunger-val">50</span>
                </div>
                <div class="stat">
                    <span>😊</span>
                    <div class="stat-bar">
                        <div class="stat-fill happy" id="happy-bar" style="width: 50%"></div>
                    </div>
                    <span id="happy-val">50</span>
                </div>
                <div class="stat">
                    <span>⚡</span>
                    <div class="stat-bar">
                        <div class="stat-fill energy" id="energy-bar" style="width: 100%"></div>
                    </div>
                    <span id="energy-val">100</span>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn" onclick="feed()">🍕</button>
            <button class="btn" onclick="play()">🎮</button>
            <button class="btn" onclick="code()">💻</button>
        </div>
    </div>

    <script>
        // Initialize Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Enable closing confirmation
        tg.enableClosingConfirmation();
        
        let pet = {
            stage: 0,
            hunger: 50,
            happy: 50,
            energy: 100,
            xp: 0,
            level: 1
        };
        
        const stages = ['🥚', '🤖', '💻', '🦖', '👑'];
        
        function updateUI() {
            document.getElementById('pet').textContent = stages[pet.stage];
            document.getElementById('level').textContent = `Level ${pet.level} - ${['Egg', 'Baby', 'Teen', 'Adult', 'Legend'][pet.stage]}`;
            document.getElementById('hunger-bar').style.width = pet.hunger + '%';
            document.getElementById('hunger-val').textContent = pet.hunger;
            document.getElementById('happy-bar').style.width = pet.happy + '%';
            document.getElementById('happy-val').textContent = pet.happy;
            document.getElementById('energy-bar').style.width = pet.energy + '%';
            document.getElementById('energy-val').textContent = pet.energy;
        }
        
        function feed() {
            pet.hunger = Math.min(100, pet.hunger + 20);
            pet.energy = Math.max(0, pet.energy - 5);
            tg.HapticFeedback.impactOccurred('light');
            updateUI();
        }
        
        function play() {
            pet.happy = Math.min(100, pet.happy + 15);
            pet.energy = Math.max(0, pet.energy - 10);
            tg.HapticFeedback.impactOccurred('medium');
            updateUI();
        }
        
        function code() {
            pet.xp += 10;
            pet.energy = Math.max(0, pet.energy - 5);
            if (pet.xp >= 100) {
                pet.level++;
                pet.xp = 0;
                if (pet.level >= 5 && pet.stage < 4) {
                    pet.stage++;
                    tg.showPopup({ title: 'Evolution!', message: 'Your pet evolved!' });
                }
            }
            tg.HapticFeedback.notificationOccurred('success');
            updateUI();
        }
        
        updateUI();
    </script>
</body>
</html>
