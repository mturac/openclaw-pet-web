<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐣 OpenClaw Pet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        
        /* ==================== STATE 1: EGG SCREEN ==================== */
        .egg-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }
        
        .egg-container {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .egg {
            font-size: 120px;
            transition: transform 0.1s;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }
        
        .egg.shake {
            animation: shake 0.1s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(-5deg) scale(1.05); }
            75% { transform: rotate(5deg) scale(1.05); }
        }
        
        .crack-overlay {
            position: absolute;
            font-size: 120px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .crack-overlay.show {
            opacity: 1;
        }
        
        .tap-hint {
            margin-top: 30px;
            text-align: center;
            font-size: 16px;
            opacity: 0.8;
            animation: pulse 2s infinite;
        }
        
        .tap-counter {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.6;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }
        
        /* ==================== STATE 2: PET SCREEN ==================== */
        .pet-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
            padding: 15px;
            max-width: 400px;
            margin: 0 auto;
        }
        
        .pet-screen.active {
            display: flex;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 10px;
        }
        
        .level-badge {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
            font-size: 14px;
            font-weight: bold;
        }
        
        /* Pet Area */
        .pet-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            margin: 10px 0;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        .pet-character {
            font-size: 100px;
            animation: bounce 2s infinite ease-in-out;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }
        
        /* Stats */
        .stats-container {
            width: 100%;
            padding: 0 20px;
            margin-top: 20px;
        }
        
        .stat-row {
            display: flex;
            align-items: center;
            margin: 12px 0;
            background: rgba(0,0,0,0.2);
            padding: 10px 15px;
            border-radius: 15px;
        }
        
        .stat-icon {
            font-size: 20px;
            margin-right: 10px;
            width: 30px;
            text-align: center;
        }
        
        .stat-bar-bg {
            flex: 1;
            height: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            overflow: hidden;
            margin-right: 10px;
        }
        
        .stat-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        
        .hunger-fill { background: linear-gradient(90deg, #ff6b6b, #ff8e8e); }
        .happy-fill { background: linear-gradient(90deg, #4ecdc4, #6ee7df); }
        .energy-fill { background: linear-gradient(90deg, #45b7d1, #74c7e3); }
        
        .stat-value {
            width: 35px;
            text-align: right;
            font-weight: bold;
            font-size: 14px;
        }
        
        /* Buttons */
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 15px;
        }
        
        .action-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 15px 10px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .action-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.3);
        }
        
        .action-btn span {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .btn-feed:active { background: rgba(255,107,107,0.5); }
        .btn-play:active { background: rgba(78,205,196,0.5); }
        .btn-code:active { background: rgba(69,183,209,0.5); }
    </style>
</head>
<body>
    <!-- STATE 1: EGG -->
    <div class="egg-screen" id="eggScreen">
        <div class="egg-container" id="eggContainer">
            <div class="egg" id="egg">🥚</div>
            <div class="crack-overlay" id="crackOverlay">🐣</div>
        </div>
        <div class="tap-hint">📱 Tap 5 times to hatch!</div>
        <div class="tap-counter" id="tapCounter">0 / 5</div>
    </div>
    
    <!-- STATE 2: PET -->
    <div class="pet-screen" id="petScreen">
        <div class="header">
            <div class="level-badge">⭐ Level <span id="levelNum">1</span> - <span id="stageName">Baby Bot</span></div>
        </div>
        
        <div class="pet-area">
            <div class="pet-character" id="petCharacter">🤖</div>
            
            <div class="stats-container">
                <div class="stat-row">
                    <span class="stat-icon">🍕</span>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fill hunger-fill" id="hungerBar" style="width: 50%"></div>
                    </div>
                    <span class="stat-value" id="hungerValue">50</span>
                </div>
                <div class="stat-row">
                    <span class="stat-icon">😊</span>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fill happy-fill" id="happyBar" style="width: 50%"></div>
                    </div>
                    <span class="stat-value" id="happyValue">50</span>
                </div>
                <div class="stat-row">
                    <span class="stat-icon">⚡</span>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fill energy-fill" id="energyBar" style="width: 100%"></div>
                    </div>
                    <span class="stat-value" id="energyValue">100</span>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button class="action-btn btn-feed" onclick="action('feed')">
                🍕
                <span>Feed</span>
            </button>
            <button class="action-btn btn-play" onclick="action('play')">
                🎮
                <span>Play</span>
            </button>
            <button class="action-btn btn-code" onclick="action('code')">
                💻
                <span>Code</span>
            </button>
        </div>
    </div>

    <script>
        // Initialize Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // ==================== GAME STATE ====================
        let gameState = {
            hatched: false,
            tapCount: 0,
            stage: 0, // 0=Baby, 1=Teen, 2=Adult, 3=Legend
            level: 1,
            xp: 0,
            hunger: 50,
            happy: 50,
            energy: 100
        };
        
        const STAGES = ['Baby Bot', 'Teen Coder', 'Senior Dev', '10x Legend'];
        const PETS = ['🤖', '💻', '🦖', '👑'];
        
        // ==================== EGG STATE ====================
        const eggContainer = document.getElementById('eggContainer');
        const egg = document.getElementById('egg');
        const crackOverlay = document.getElementById('crackOverlay');
        const tapCounter = document.getElementById('tapCounter');
        const eggScreen = document.getElementById('eggScreen');
        const petScreen = document.getElementById('petScreen');
        
        eggContainer.addEventListener('click', function() {
            if (gameState.hatched) return;
            
            gameState.tapCount++;
            
            // Visual feedback
            egg.classList.add('shake');
            setTimeout(() => egg.classList.remove('shake'), 100);
            
            // Haptic
            tg.HapticFeedback.impactOccurred('light');
            
            // Show crack after 3 taps
            if (gameState.tapCount >= 3) {
                crackOverlay.classList.add('show');
            }
            
            // Update counter
            tapCounter.textContent = gameState.tapCount + ' / 5';
            
            // HATCH!
            if (gameState.tapCount >= 5) {
                hatchEgg();
            }
        });
        
        function hatchEgg() {
            gameState.hatched = true;
            
            // Animation
            egg.style.transition = 'all 0.5s';
            egg.style.transform = 'scale(1.5) rotate(10deg)';
            egg.style.opacity = '0';
            
            tg.HapticFeedback.notificationOccurred('success');
            
            setTimeout(() => {
                // Switch screens
                eggScreen.style.display = 'none';
                petScreen.classList.add('active');
                
                // Show welcome popup
                tg.showPopup({
                    title: '🎉 Welcome!',
                    message: 'Your Baby Bot has hatched! Take good care of it!'
                });
                
                updateUI();
            }, 500);
        }
        
        // ==================== PET STATE ====================
        function action(type) {
            if (!gameState.hatched) return;
            
            tg.HapticFeedback.impactOccurred('medium');
            
            switch(type) {
                case 'feed':
                    gameState.hunger = Math.min(100, gameState.hunger + 20);
                    gameState.energy = Math.max(0, gameState.energy - 5);
                    addXP(5);
                    break;
                case 'play':
                    gameState.happy = Math.min(100, gameState.happy + 15);
                    gameState.energy = Math.max(0, gameState.energy - 10);
                    gameState.hunger = Math.max(0, gameState.hunger - 10);
                    addXP(10);
                    break;
                case 'code':
                    gameState.energy = Math.max(0, gameState.energy - 5);
                    addXP(15);
                    break;
            }
            
            updateUI();
        }
        
        function addXP(amount) {
            gameState.xp += amount;
            
            if (gameState.xp >= 100) {
                gameState.level++;
                gameState.xp = 0;
                
                // Check evolution
                const newStage = Math.floor((gameState.level - 1) / 5);
                if (newStage > gameState.stage && newStage < 4) {
                    gameState.stage = newStage;
                    
                    tg.showPopup({
                        title: '✨ Evolution!',
                        message: `Your pet evolved into ${STAGES[gameState.stage]}!`
                    });
                }
            }
        }
        
        function updateUI() {
            document.getElementById('levelNum').textContent = gameState.level;
            document.getElementById('stageName').textContent = STAGES[gameState.stage];
            document.getElementById('petCharacter').textContent = PETS[gameState.stage];
            
            document.getElementById('hungerBar').style.width = gameState.hunger + '%';
            document.getElementById('hungerValue').textContent = gameState.hunger;
            
            document.getElementById('happyBar').style.width = gameState.happy + '%';
            document.getElementById('happyValue').textContent = gameState.happy;
            
            document.getElementById('energyBar').style.width = gameState.energy + '%';
            document.getElementById('energyValue').textContent = gameState.energy;
        }
        
        // Auto decay (every minute)
        setInterval(() => {
            if (!gameState.hatched) return;
            
            gameState.hunger = Math.max(0, gameState.hunger - 1);
            gameState.happy = Math.max(0, gameState.happy - 1);
            updateUI();
        }, 60000);
    </script>
</body>
</html>
